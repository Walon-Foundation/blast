# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

before:
  hooks:
    - cargo fetch --locked

builds:
  - id: unix
    builder: rust
    flags:
      - --release
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
      - x86_64-pc-windows-gnu

  - id: darwin
    builder: rust
    flags:
      - --release
    targets:
      - x86_64-apple-darwin
      - aarch64-apple-darwin

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: Walon-Foundation
    name: blast
  draft: true
  footer: >-
    ---

    **Download the binary for your platform above.**

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
